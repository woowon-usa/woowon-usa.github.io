name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_APPS_SCRIPT_ENDPOINT: ${{ secrets.VITE_GOOGLE_APPS_SCRIPT_ENDPOINT }}

      - name: Copy build to docs
        run: |
          rm -rf docs
          cp -r dist docs

      - name: Commit and push docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Auto build and deploy"
          git push
